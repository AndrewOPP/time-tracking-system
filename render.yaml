databases:
  - name: viso-postgres
    databaseName: visodb
    user: visouser
    plan: free

services:
  # ==========================================
  # 1. NESTJS
  # ==========================================
  - type: web
    name: viso-api
    env: node
    plan: free
    buildCommand: npm install -g pnpm@9.0.0 && pnpm install --prod=false --ignore-scripts && pnpm run db:generate && pnpm turbo run build --filter=@time-tracking-app/api
    startCommand: npx prisma@6 migrate deploy --schema=./packages/database/prisma/schema.prisma && node apps/api/dist/src/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: viso-postgres
          property: connectionString
      - key: NODE_ENV
        value: production

  # ==========================================
  # 2. VITE + REACT
  # ==========================================
  - type: web
    name: viso-web
    env: static
    buildCommand: npm install -g pnpm@9.0.0 && pnpm install --prod=false --ignore-scripts && pnpm turbo run build --filter=web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_PUBLIC_API_URL
        value: https://viso-api.onrender.com
