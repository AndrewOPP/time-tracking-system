databases:
  - name: viso-postgres
    databaseName: visodb
    user: visouser
    plan: free

services:
  # ==========================================
  # 1. NESTJS БЭКЕНД
  # ==========================================
  - type: web
    name: viso-api
    env: node
    buildCommand: npm install -g pnpm@9.0.0 && pnpm install && pnpm run db:generate && pnpm turbo run build --filter=@time-tracking-app/api
    startCommand: pnpm run db:migrate && cd apps/api && pnpm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: viso-postgres
          property: connectionString
      - key: NODE_ENV
        value: production

  # ==========================================
  # 2. VITE + REACT
  # ==========================================
  - type: web
    name: viso-web
    env: static
    buildCommand: npm install -g pnpm@9.0.0 && pnpm install && pnpm turbo run build --filter=web
    publishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_PUBLIC_API_URL
        fromService:
          type: web
          name: viso-api
          property: host
